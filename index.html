<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6f472d" />
  <title>Waffle Goes Fishing</title>
  <style>
    :root {
      --brown: #6f472d;
      --cream: #fff8e8;
      --gold: #e7b45d;
      --shadow: rgba(45, 30, 18, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.55), transparent 35%),
        linear-gradient(180deg, #dcefc7 0%, #9cc47f 45%, #5f8257 100%);
      color: #2f241d;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: min(1100px, 100%);
      text-align: center;
      padding: 22px 18px 12px;
    }

    h1 {
      margin: 0;
      color: var(--brown);
      font-size: clamp(2rem, 5vw, 4rem);
      text-shadow: 0 2px 0 rgba(255,255,255,.55);
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
    }

    main {
      width: 100%;
      max-width: 1100px;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px max(18px, env(safe-area-inset-right)) 26px max(18px, env(safe-area-inset-left));
    }

    .book-shell {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    .page-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 561 / 701;
      border: 10px solid var(--cream);
      border-radius: 22px;
      overflow: hidden;
      background: var(--cream);
      box-shadow: 0 20px 50px var(--shadow);
      touch-action: pan-y;
    }

    .page-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--cream);
      user-select: none;
      -webkit-user-drag: none;
    }

    .counter {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      min-width: 112px;
      padding: 10px 18px;
      border: 3px solid rgba(111, 71, 45, .25);
      border-radius: 999px;
      text-align: center;
      background: rgba(255, 248, 232, .9);
      color: var(--brown);
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,.2);
    }

    .controls {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--brown);
      color: white;
      box-shadow: 0 6px 16px rgba(45,30,18,.24);
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .42; cursor: not-allowed; transform: none; }


    @media (max-width: 620px) {
      header {
        padding: 14px max(12px, env(safe-area-inset-right)) 10px max(12px, env(safe-area-inset-left));
      }
      main {
        padding: 8px max(10px, env(safe-area-inset-right)) 22px max(10px, env(safe-area-inset-left));
      }
      .book-shell {
        width: 100%;
        max-width: 100%;
        margin-inline: auto;
      }
      .page-frame { border-width: 6px; border-radius: 14px; }
      button { padding: 11px 14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Waffle Goes Fishing</h1>
  </header>

  <main>
    <section class="book-shell" aria-label="Waffle Goes Fishing storybook">
      <div class="page-frame" id="pageFrame">
        <img id="pageImage" src="images/cover.png" alt="Cover of Waffle Goes Fishing" />
        <div class="counter" id="counter">Cover</div>
      </div>

      <div class="controls">
        <button id="prevButton" type="button" aria-label="Previous page">← Previous</button>
        <button id="nextButton" type="button" aria-label="Next page">Next →</button>
      </div>
    </section>
  </main>


  <script>
    const storyPages = 10;
    const totalSlides = storyPages + 2; // cover + story pages + The End
    let currentSlide = 0;

    const image = document.getElementById("pageImage");
    const counter = document.getElementById("counter");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");
    const frame = document.getElementById("pageFrame");

    function slidePath(slide) {
      if (slide === 0) return "images/cover.png";
      if (slide === totalSlides - 1) return "images/the-end.png";
      return `images/page-${String(slide).padStart(2, "0")}.png`;
    }

    function slideLabel(slide) {
      if (slide === 0) return "Cover";
      if (slide === totalSlides - 1) return "The End";
      return `${slide} / ${storyPages}`;
    }


    function showSlide(slide) {
      currentSlide = Math.max(0, Math.min(totalSlides - 1, slide));
      image.src = slidePath(currentSlide);
      image.alt = currentSlide === 0
        ? "Cover of Waffle Goes Fishing"
        : currentSlide === totalSlides - 1
          ? "The End page of Waffle Goes Fishing"
          : `Page ${currentSlide} of Waffle Goes Fishing`;
      counter.textContent = slideLabel(currentSlide);
      prevButton.disabled = currentSlide === 0;
      nextButton.textContent = currentSlide === totalSlides - 1 ? "Read Again →" : "Next →";
    }

    function nextSlide() {
      if (currentSlide === totalSlides - 1) {
        showSlide(0);
      } else {
        showSlide(currentSlide + 1);
      }
    }

    prevButton.addEventListener("click", () => showSlide(currentSlide - 1));
    nextButton.addEventListener("click", nextSlide);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") showSlide(currentSlide - 1);
      if (event.key === "ArrowRight") nextSlide();
    });

    let touchStartX = 0;
    frame.addEventListener("touchstart", (event) => {
      touchStartX = event.changedTouches[0].screenX;
    }, { passive: true });

    frame.addEventListener("touchend", (event) => {
      const difference = event.changedTouches[0].screenX - touchStartX;
      if (difference > 50) showSlide(currentSlide - 1);
      if (difference < -50) nextSlide();
    }, { passive: true });

    for (let slide = 1; slide < totalSlides; slide++) {
      const preload = new Image();
      preload.src = slidePath(slide);
    }

    showSlide(0);
  </script>
</body>
</html>
