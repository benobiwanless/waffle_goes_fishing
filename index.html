<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6f472d" />
  <title>Waffle Goes Fishing</title>
  <style>
    :root {
      --brown: #6f472d;
      --cream: #fff8e8;
      --gold: #e7b45d;
      --shadow: rgba(45, 30, 18, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.55), transparent 35%),
        linear-gradient(180deg, #dcefc7 0%, #9cc47f 45%, #5f8257 100%);
      color: #2f241d;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: min(1100px, 100%);
      text-align: center;
      padding: 22px 18px 12px;
    }

    h1 {
      margin: 0;
      color: var(--brown);
      font-size: clamp(2rem, 5vw, 4rem);
      text-shadow: 0 2px 0 rgba(255,255,255,.55);
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
    }

    main {
      width: 100%;
      max-width: 1100px;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px max(18px, env(safe-area-inset-right)) 26px max(18px, env(safe-area-inset-left));
    }

    .book-shell {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    .page-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 561 / 701;
      border: 10px solid var(--cream);
      border-radius: 22px;
      overflow: hidden;
      background: var(--cream);
      box-shadow: 0 20px 50px var(--shadow);
      touch-action: pan-y;
    }

    .page-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--cream);
      user-select: none;
      -webkit-user-drag: none;
    }

    .counter {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 248, 232, .9);
      color: var(--brown);
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,.2);
    }

    .controls {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--brown);
      color: white;
      box-shadow: 0 6px 16px rgba(45,30,18,.24);
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .42; cursor: not-allowed; transform: none; }

    .dots {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 7px;
      max-width: 300px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 2px solid var(--brown);
      background: transparent;
      padding: 0;
      box-shadow: none;
    }

    .dot.active { background: var(--gold); }

    footer {
      width: min(1100px, 100%);
      padding: 0 18px 22px;
      text-align: center;
      color: rgba(47, 36, 29, .8);
      font-size: .95rem;
    }

    @media (max-width: 620px) {
      header {
        padding: 14px max(12px, env(safe-area-inset-right)) 10px max(12px, env(safe-area-inset-left));
      }
      main {
        padding: 8px max(10px, env(safe-area-inset-right)) 22px max(10px, env(safe-area-inset-left));
      }
      .book-shell {
        width: 100%;
        max-width: 100%;
        margin-inline: auto;
      }
      .page-frame { border-width: 6px; border-radius: 14px; }
      .controls { grid-template-columns: 1fr 1fr; }
      .dots { grid-column: 1 / -1; grid-row: 2; }
      button { padding: 11px 14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Waffle Goes Fishing</h1>
    <p class="subtitle">A gentle picture book for little readers</p>
  </header>

  <main>
    <section class="book-shell" aria-label="Waffle Goes Fishing storybook">
      <div class="page-frame" id="pageFrame">
        <img id="pageImage" src="images/page-01.png" alt="Page 1 of Waffle Goes Fishing" />
        <div class="counter" id="counter">1 / 10</div>
      </div>

      <div class="controls">
        <button id="prevButton" type="button" aria-label="Previous page">← Previous</button>
        <div class="dots" id="dots" aria-label="Choose a page"></div>
        <button id="nextButton" type="button" aria-label="Next page">Next →</button>
      </div>
    </section>
  </main>

  <footer>
    Use the arrow keys, the buttons, or swipe left and right to turn the pages.
  </footer>

  <script>
    const totalPages = 10;
    let currentPage = 1;

    const image = document.getElementById("pageImage");
    const counter = document.getElementById("counter");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");
    const dotsContainer = document.getElementById("dots");
    const frame = document.getElementById("pageFrame");

    function pagePath(page) {
      return `images/page-${String(page).padStart(2, "0")}.png`;
    }

    function renderDots() {
      dotsContainer.innerHTML = "";
      for (let page = 1; page <= totalPages; page++) {
        const dot = document.createElement("button");
        dot.type = "button";
        dot.className = "dot" + (page === currentPage ? " active" : "");
        dot.setAttribute("aria-label", `Go to page ${page}`);
        dot.addEventListener("click", () => showPage(page));
        dotsContainer.appendChild(dot);
      }
    }

    function showPage(page) {
      currentPage = Math.max(1, Math.min(totalPages, page));
      image.src = pagePath(currentPage);
      image.alt = `Page ${currentPage} of Waffle Goes Fishing`;
      counter.textContent = `${currentPage} / ${totalPages}`;
      prevButton.disabled = currentPage === 1;
      nextButton.disabled = currentPage === totalPages;
      renderDots();
    }

    prevButton.addEventListener("click", () => showPage(currentPage - 1));
    nextButton.addEventListener("click", () => showPage(currentPage + 1));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") showPage(currentPage - 1);
      if (event.key === "ArrowRight") showPage(currentPage + 1);
    });

    let touchStartX = 0;
    frame.addEventListener("touchstart", (event) => {
      touchStartX = event.changedTouches[0].screenX;
    }, { passive: true });

    frame.addEventListener("touchend", (event) => {
      const difference = event.changedTouches[0].screenX - touchStartX;
      if (difference > 50) showPage(currentPage - 1);
      if (difference < -50) showPage(currentPage + 1);
    }, { passive: true });

    // Preload the remaining pages for smoother page turns.
    for (let page = 2; page <= totalPages; page++) {
      const preload = new Image();
      preload.src = pagePath(page);
    }

    showPage(1);
  </script>
</body>
</html>
